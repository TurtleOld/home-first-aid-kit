map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
}

log_format api_timing '$remote_addr - $request_time $upstream_response_time "$request" $status';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log api_timing;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 15m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
    }

    # /media/ is not served directly — files go through /api/media/<path>,
    # which checks family membership and hands off here via X-Accel-Redirect.
    location /protected-media/medicine_instructions/ {
        internal;
        alias /media/medicine_instructions/;
        expires 30d;
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Disposition "attachment";
    }

    location /protected-media/ {
        internal;
        alias /media/;
        expires 30d;
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /media/ {
        internal;
    }

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    }
}
