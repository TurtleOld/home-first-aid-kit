services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firstaid}
      POSTGRES_USER: ${POSTGRES_USER:-firstaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firstaid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firstaid} -d ${POSTGRES_DB:-firstaid}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/turtleold/home-first-aid-kit:latest}
    env_file:
      - path: .env
        required: false
    environment:
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-postgres://firstaid:firstaid@db:5432/firstaid}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://localhost}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
    volumes:
      - backend_media:/app/backend/media
      - backend_static:/app/backend/staticfiles
      - frontend_dist:/app/runtime/frontend
      - nginx_config:/app/runtime/nginx
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/runtime/frontend/index.html -a -f /app/runtime/nginx/default.conf"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py collectstatic --noinput &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - nginx_config:/etc/nginx/conf.d:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - backend_media:/media:ro
      - backend_static:/static:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_media:
  backend_static:
  frontend_dist:
  nginx_config:
