<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <title>Домашняя аптечка</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --text: #172033;
        --muted: #647083;
        --border: #d9e0dc;
        --accent: #0f766e;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #121418;
          --surface: #1b2027;
          --text: #f3f6f8;
          --muted: #aeb8c4;
          --border: #333c47;
          --accent: #2dd4bf;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      main {
        width: min(420px, 100%);
        display: grid;
        gap: 14px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.45rem;
        line-height: 1.2;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет подключения</h1>
      <p>Оболочка приложения сохранена на устройстве. Данные аптечки обновятся после восстановления сети.</p>
      <a href="/">Открыть приложение</a>
    </main>
  </body>
</html>
